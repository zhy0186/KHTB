<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH TAOBAO</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <div class="logo-section">

        <div class="title-group">
            <h1>KH TAOBAO</h1>
            <h2>KH 淘宝</h2>
        </div>

    </div>

    <button class="admin-btn">
        Admin Login
    </button>

</header>

<section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Item / 搜索物品"
    >

</section>

<main id="inventoryContainer">

</main>

<section class="activity-section">

    <h3>
        Recent Activity
        <br>
        最近操作记录
    </h3>

    <div id="activityContainer"></div>

</section>

<footer>

    <p></p>

    <p>
        如发现任何异常或BUG，请截图发送给 Z Y。
    </p>

</footer>

<!-- ========================= -->
<!-- Admin Login Modal -->
<!-- ========================= -->

<div id="loginModal" class="modal">

    <div class="modal-content">

        <h2>Admin Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <div class="modal-buttons">

            <button id="loginBtn">
                Login
            </button>

            <button id="cancelBtn">
                Cancel
            </button>

        </div>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
