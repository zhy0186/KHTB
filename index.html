<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH TAOBAO</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <div class="logo-section">

        <div class="title-group">
            <h1>KH TAOBAO</h1>
            <h2>KH 淘宝</h2>
        </div>

    </div>

    <div class="header-buttons">

        <button id="addItemBtn" class="admin-btn" style="display:none;">
            + Add Item
        </button>
        
        <button id="adminBtn" class="admin-btn">
            Login
        </button>

    </div>

</header>

<section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Item / 搜索物品"
    >

</section>

<main id="inventoryContainer"></main>

<section class="activity-section">

    <h3>
        Recent Activity
        <br>
        最近操作记录
    </h3>

    <div id="activityContainer"></div>

</section>

<footer>

    <p>
        登录密码为123456 如需添加数量请登录，如果只是拿取无需登录 - Z
    </p>

</footer>

<!-- Login -->

<div id="loginModal" class="modal">

    <div class="modal-content">

        <h2>Admin Login</h2>

        <input
            type="password"
            id="password"
            placeholder="Admin Password"
        >

        <div class="modal-buttons">

            <button id="loginBtn">
                Login
            </button>

            <button id="cancelBtn">
                Cancel
            </button>

        </div>

    </div>

</div>

<!-- Add Item -->

<div id="addItemModal" class="modal">

    <div class="modal-content">

        <h2>Add Item</h2>

        <input
            id="nameCN"
            placeholder="Chinese Name"
        >

        <input
            id="nameEN"
            placeholder="English Name"
        >

        <input
            id="stock"
            type="number"
            placeholder="Stock"
        >

        <div class="modal-buttons">

            <button id="saveItemBtn">
                Save
            </button>

            <button id="cancelItemBtn">
                Cancel
            </button>

        </div>

    </div>

</div>

<script type="module" src="script.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
